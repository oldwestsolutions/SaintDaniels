<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaintDaniels - Login</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
    <div class="min-h-screen flex flex-col">
        <nav class="bg-white shadow-lg">
            <div class="max-w-7xl mx-auto px-4">
                <div class="flex justify-between items-center h-20">
                    <div class="flex items-center">
                        <a href="index.html" class="text-3xl font-bold text-mint">Saint<span class="text-coral">Daniels</span></a>
                    </div>
                </div>
            </div>
        </nav>

        <div class="flex-1 flex items-center justify-center px-4 py-12">
            <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Welcome Back</h2>
                <form class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                        <input type="email" class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:border-mint">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                        <input type="password" class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:border-mint">
                    </div>
                    <div class="flex items-center justify-between">
                        <label class="flex items-center">
                            <input type="checkbox" class="text-mint">
                            <span class="ml-2 text-sm text-gray-600">Remember me</span>
                        </label>
                        <a href="#" class="text-sm text-mint hover:text-coral">Forgot password?</a>
                    </div>
                    <button type="submit" class="w-full bg-mint text-white py-2 rounded-lg hover:bg-coral transition duration-300">
                        Sign In
                    </button>
                </form>
                <div class="mt-6 text-center">
                    <span class="text-gray-600">Don't have an account?</span>
                    <a href="#" class="text-mint hover:text-coral ml-1">Sign up</a>
                </div>
            </div>
        </div>
    </div>

    <style>
        .bg-mint { background-color: #4AC29A; }
        .text-mint { color: #4AC29A; }
        .hover\:bg-mint:hover { background-color: #4AC29A; }
        .border-mint { border-color: #4AC29A; }
        .bg-coral { background-color: #FF6F61; }
        .text-coral { color: #FF6F61; }
        .hover\:bg-coral:hover { background-color: #FF6F61; }
    </style>
</body>
</html>
